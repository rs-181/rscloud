<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Cloud - Private Directory</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #2962ff;
            --text: #ffffff;
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px;
        }
        .container { max-width: 650px; margin: auto; }
        header { 
            text-align: center; 
            padding: 20px 0; 
            border-bottom: 1px solid #222; 
            margin-bottom: 20px; 
        }
        h1 { font-size: 22px; color: var(--accent); margin-bottom: 5px; }
        .file-card {
            background: var(--card);
            padding: 12px 18px;
            margin: 10px 0;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1f1f1f;
            transition: 0.3s ease;
        }
        .file-card:hover { border-color: var(--accent); background: #1a1a1a; }
        .file-link { color: var(--text); text-decoration: none; font-size: 15px; flex-grow: 1; }
        .icon { margin-right: 12px; font-size: 18px; }
        .btn-view { 
            background: var(--accent); 
            color: white; 
            padding: 6px 15px; 
            border-radius: 6px; 
            font-size: 12px; 
            text-decoration: none;
            font-weight: bold;
        }
        .loading { text-align: center; opacity: 0.5; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>RS Cloud Storage</h1>
        <p style="font-size: 12px; opacity: 0.6;">Secure & Automatic Directory Listing</p>
    </header>

    <div id="loading" class="loading">Scanning Files...</div>
    <div id="file-list"></div>
</div>

<script>
    const user = 'rs-181';
    const repo = 'rscloud';

    async function loadFiles() {
        const url = `https://api.github.com/repos/${user}/${repo}/contents/`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            document.getElementById('loading').style.display = 'none';
            const list = document.getElementById('file-list');

            data.forEach(file => {
                // index.html ko list se bahar rakhne ke liye
                if (file.name === 'index.html' || file.name === '.git') return;

                let finalUrl = file.download_url;
                
                // HTML files ko bina warning ke website ki tarah dikhane ke liye jsDelivr
                if (file.name.endsWith('.html')) {
                    finalUrl = `https://cdn.jsdelivr.net/gh/${user}/${repo}@main/${encodeURIComponent(file.name)}`;
                }

                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <div style="display:flex; align-items:center; flex-grow:1;">
                        <span class="icon">${file.type === 'dir' ? '📁' : '📄'}</span>
                        <a href="${finalUrl}" class="file-link" target="_blank">${file.name}</a>
                    </div>
                    <a href="${finalUrl}" class="btn-view" target="_blank">OPEN</a>
                `;
                list.appendChild(card);
            });
        } catch (error) {
            document.getElementById('loading').innerHTML = "Error: Check your connection or repo name.";
        }
    }

    loadFiles();
</script>

</body>
</html>
