<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Secure Cloud</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --text-main: #ffffff;
            --accent: #007bff;
        }
        body { background: var(--bg-color); color: var(--text-main); font-family: sans-serif; padding: 20px; }
        .container { max-width: 700px; margin: auto; }
        .file-card {
            background: var(--card-bg);
            padding: 15px;
            margin: 8px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222;
        }
        .file-link { color: var(--text-main); text-decoration: none; font-weight: 500; flex-grow: 1; }
        .file-card:hover { border-color: var(--accent); background: #1f1f1f; }
        .type-icon { margin-right: 12px; }
        .btn-view { background: var(--accent); color: white; padding: 5px 12px; border-radius: 5px; font-size: 12px; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>RS Storage <span style="font-size: 12px; opacity: 0.5;">Private Access</span></h2>
    <div id="list">Loading...</div>
</div>

<script>
    const user = 'rs-181';
    const repo = 'rscloud'; // अपना Repo नाम यहाँ लिखें

    async function loadFiles() {
        const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/`);
        const files = await res.json();
        const list = document.getElementById('list');
        list.innerHTML = '';

        files.forEach(file => {
            if (file.name === 'index.html' || file.name === '.git') return;

            let finalUrl = file.download_url;
            
            // अगर HTML फाइल है, तो उसे Code के बदले Website की तरह दिखाने के लिए githack का इस्तेमाल करें
            if (file.name.endsWith('.html')) {
                finalUrl = `https://raw.githack.com/${user}/${repo}/main/${file.name}`;
            }

            const card = document.createElement('div');
            card.className = 'file-card';
            card.innerHTML = `
                <div style="display:flex; align-items:center;">
                    <span class="type-icon">${file.type === 'dir' ? '📁' : '📄'}</span>
                    <a href="${finalUrl}" class="file-link" target="_blank">${file.name}</a>
                </div>
                <a href="${finalUrl}" class="btn-view" target="_blank">Open</a>
            `;
            list.appendChild(card);
        });
    }
    loadFiles();
</script>

</body>
</html>
