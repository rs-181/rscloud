<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Hand-Tracked Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; } /* Hide the raw video feed */
        #info {
            position: absolute; top: 10px; left: 10px; color: white; 
            font-family: sans-serif; pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="info">
        <h3>Gesture Controls:</h3>
        <p>🖐 <b>Move Hand:</b> Attract/Move particles</p>
        <p>🤏 <b>Pinch (Index+Thumb):</b> Switch Shape</p>
        <p>Current Shape: <span id="shape-name">Random</span></p>
    </div>
    <video id="input_video"></video>

    <script type="module">
        import * as THREE from 'three';

        // --- CONFIGURATION ---
        const PARTICLE_COUNT = 15000;
        const CAM_Z = 50;
        let currentShapeIndex = 0;
        const shapes = ['Random', 'Sphere', 'Heart', 'Saturn', 'Flower'];
        let isPinching = false;
        
        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = CAM_Z;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- PARTICLE SYSTEM ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3); // Where particles want to go
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        const color1 = new THREE.Color(0x00ffff); // Cyan
        const color2 = new THREE.Color(0xff00ff); // Magenta

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 100;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 100;

            // Initial Colors
            colors[i * 3] = color1.r;
            colors[i * 3 + 1] = color1.g;
            colors[i * 3 + 2] = color1.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.3,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.8
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- SHAPE GENERATORS ---
        function setTargetShape(shapeType) {
            document.getElementById('shape-name').innerText = shapeType;
            const scale = 15; 
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let x, y, z;
                const i3 = i * 3;

                if (shapeType === 'Random') {
                    x = (Math.random() - 0.5) * 80;
                    y = (Math.random() - 0.5) * 80;
                    z = (Math.random() - 0.5) * 80;
                } 
                else if (shapeType === 'Sphere') {
                    const r = scale * 1.5;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                }
                else if (shapeType === 'Heart') {
                    // Parametric Heart
                    const t = Math.random() * Math.PI * 2;
                    const r = scale * 0.05; // dense core
                    // Spread particles randomly within the volume
                    const xp = 16 * Math.pow(Math.sin(t), 3);
                    const yp = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    
                    x = xp * (scale/16) + (Math.random()-0.5)*2;
                    y = yp * (scale/16) + (Math.random()-0.5)*2;
                    z = (Math.random() - 0.5) * 5;
                }
                else if (shapeType === 'Saturn') {
                    // 70% Planet, 30% Rings
                    if (i < PARTICLE_COUNT * 0.7) {
                        // Planet
                        const r = scale; 
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        x = r * Math.sin(phi) * Math.cos(theta);
                        y = r * Math.sin(phi) * Math.sin(theta);
                        z = r * Math.cos(phi);
                    } else {
                        // Rings
                        const angle = Math.random() * Math.PI * 2;
                        const radius = scale * (1.4 + Math.random()); 
                        x = radius * Math.cos(angle);
                        z = radius * Math.sin(angle); // Flat on XZ plane
                        y = (Math.random() - 0.5) * 1;
                        
                        // Tilt the rings
                        const tilt = 0.4;
                        const yt = y * Math.cos(tilt) - z * Math.sin(tilt);
                        const zt = y * Math.sin(tilt) + z * Math.cos(tilt);
                        y = yt; z = zt;
                    }
                }
                else if (shapeType === 'Flower') {
                     const r = scale * Math.sqrt(Math.random());
                     const theta = Math.random() * Math.PI * 2;
                     const k = 4; // number of petals
                     const r_petal = Math.cos(k * theta);
                     
                     x = r * r_petal * Math.cos(theta) * 2;
                     y = r * r_petal * Math.sin(theta) * 2;
                     z = (Math.random() - 0.5) * 10;
                }

                targetPositions[i3] = x;
                targetPositions[i3 + 1] = y;
                targetPositions[i3 + 2] = z;
            }
        }

        // Initialize first shape
        setTargetShape(shapes[0]);

        // --- HAND TRACKING INTEGRATION ---
        let handX = 0, handY = 0;
        let handDetected = false;

        const videoElement = document.getElementById('input_video');
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handDetected = true;
                const landmarks = results.multiHandLandmarks[0];
                
                // Index finger tip is landmark 8
                // Coordinates are normalized 0-1. Map to 3D world space approx.
                // We invert X because the camera is mirrored
                handX = (0.5 - landmarks[8].x) * 60; 
                handY = (0.5 - landmarks[8].y) * 40;

                // Detect Pinch (Thumb Tip 4 to Index Tip 8)
                const dx = landmarks[8].x - landmarks[4].x;
                const dy = landmarks[8].y - landmarks[4].y;
                const distance = Math.sqrt(dx*dx + dy*dy);

                if (distance < 0.05) {
                    if (!isPinching) {
                        isPinching = true;
                        // Cycle Shape
                        currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
                        setTargetShape(shapes[currentShapeIndex]);
                        
                        // Change color on switch
                        const r = Math.random();
                        const g = Math.random();
                        const b = Math.random();
                        for(let k=0; k<PARTICLE_COUNT*3; k+=3){
                             colors[k] = r + (Math.random()-0.5)*0.2;
                             colors[k+1] = g + (Math.random()-0.5)*0.2;
                             colors[k+2] = b + (Math.random()-0.5)*0.2;
                        }
                        geometry.attributes.color.needsUpdate = true;
                    }
                } else {
                    isPinching = false;
                }

            } else {
                handDetected = false;
            }
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        cameraUtils.start();

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            const positionsArr = geometry.attributes.position.array;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                
                // 1. Lerp towards target shape (Morphing effect)
                // We move 5% of the way to the target every frame for smoothness
                positionsArr[i3] += (targetPositions[i3] - positionsArr[i3]) * 0.05;
                positionsArr[i3 + 1] += (targetPositions[i3 + 1] - positionsArr[i3 + 1]) * 0.05;
                positionsArr[i3 + 2] += (targetPositions[i3 + 2] - positionsArr[i3 + 2]) * 0.05;

                // 2. Hand Interaction (Repulsion/Attraction)
                if (handDetected) {
                    const dx = positionsArr[i3] - handX;
                    const dy = positionsArr[i3 + 1] - handY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    // If close to hand, expand outwards (interaction)
                    if (dist < 15) {
                        const force = (15 - dist) * 0.5; // Strength
                        positionsArr[i3] += (dx / dist) * force;
                        positionsArr[i3 + 1] += (dy / dist) * force;
                    }
                }

                // 3. Subtle idle animation
                if (!handDetected) {
                     positionsArr[i3] += Math.sin(time + positionsArr[i3 + 1] * 0.5) * 0.02;
                }
            }

            geometry.attributes.position.needsUpdate = true;

            // Rotate entire system slowly
            particles.rotation.y = time * 0.1;

            renderer.render(scene, camera);
        }

        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
